        - paragraph [ref=e35]: "I'm Kartik — a software engineer from Ahmedabad who has spent the last 5+ years building products end-to-end: web apps, mobile apps and, increasingly, AI-powered features that make software feel alive."
        - paragraph [ref=e36]:
          - text: I started at a digital agency, working directly with clients and learning that shipping the
          - emphasis [ref=e37]: right
          - text: thing matters more than shipping the clever thing. Since then I've converted an e-commerce site into a full ERP (CASSA Group), launched a UK booking SaaS with payments and native mobile apps (THAT TIME), and built AI-driven platforms with Next.js.
        - paragraph [ref=e38]: "My sweet spot is owning a feature from first wireframe to AWS deployment — frontend, backend, database, pipeline. I've worked across B2B and B2C products, enterprise systems and platform migrations, and I handle the surrounding work too: technical SEO, marketing brochures and design assets when a project needs them. I work in agile teams, run code reviews, and communicate with clients like a partner, not a ticket-taker."
        - paragraph [ref=e39]: "Beyond code: exploring new AI tooling, building side projects (this portfolio and its chatbot are one), and keeping up with where software is heading next."
